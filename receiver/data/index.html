<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC Leveling Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="clock"></div>
  <img id="logo" src="logo.png" alt="Company Logo">
  
  <div class="background">
    <div class="overlay">
      <h1>CNC Machine Leveling Dashboard</h1>
      <h2 id="datetime">Loading date...</h2>
      

      <div id="sensor-grid">
        <div class="sensor-box" id="sensor1">
          <h2>Sensor 1</h2>
          <p id="status1">Waiting...</p>
        </div>
        <div class="sensor-box" id="sensor2">
          <h2>Sensor 2</h2>
          <p id="status2">Waiting...</p>
        </div>
        <div class="sensor-box" id="sensor3">
          <h2>Sensor 3</h2>
          <p id="status3">Waiting...</p>
        </div>
        <div class="sensor-box" id="sensor4">
          <h2>Sensor 4</h2>
          <p id="status4">Waiting...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
